<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>待办事项</h1>
      <p class="subtitle">记录今天要做的事</p>
    </header>

    <form class="todo-form" id="todoForm" autocomplete="off">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="添加新任务…"
        maxlength="200"
        aria-label="新任务"
      >
      <button type="submit" class="btn-add" aria-label="添加任务">添加</button>
    </form>

    <div class="toolbar" id="toolbar" hidden>
      <div class="filters" role="tablist">
        <button type="button" class="filter-btn active" data-filter="all">全部</button>
        <button type="button" class="filter-btn" data-filter="active">进行中</button>
        <button type="button" class="filter-btn" data-filter="completed">已完成</button>
      </div>
      <button type="button" class="btn-clear" id="clearCompleted" hidden>清除已完成</button>
    </div>

    <ul class="todo-list" id="todoList" aria-live="polite"></ul>

    <footer class="footer" id="footer" hidden>
      <span id="itemsLeft">0 项待完成</span>
    </footer>

    <p class="empty-state" id="emptyState">暂无任务，添加一条开始吧</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
